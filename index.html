<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Top Outfits of Summer 2026</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Unkempt:wght@400;700&display=swap" rel="stylesheet">
		<style type="text/css">
			* {
				text-align: center;
				background-color: #F49FBC;
				color: Black;
			}
			.filter_item {
				padding-left: 15px;
				padding-right: 15px;
				font-size: large;
				white-space:nowrap;
			}
			.outfitImg {
				max-height: 90vh;
				max-width: 90vh;
			}
			img {
				height: 100%;
				width: 100%;
			}
			.unkempt-regular {
				font-family: "Unkempt", cursive;
				font-weight: 400;
				font-style: normal;
			}
			.unkempt-bold {
				font-family: "Unkempt", cursive;
				font-weight: 700;
				font-style: normal;
			}
			input {
				accent-color: #7433C4;
			}
		</style>
		<meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, width=device-width, user-scalable=no" />
	</head>
	<body onload="initPage()">
		<h1 class='unkempt-bold'>Top Outfits of Summer 2026</h1>
		<h2 class='unkempt-bold'>Selected by Husbands, Suitors, and Admirers</h2>
		<span id="filter_container"></span>
		<div id="img_div">
		</div>
		
		<script src="jquery.min.js" type="text/javascript"></script>
		<script src="outfits.js" type="text/javascript"></script>
		<script src="ui.js" type="text/javascript"></script>
		<script>
			filters = {};
			
			function initPage()
			{
				for (var i = 0; i < outfits.length; i += 1)
				{
					var o = outfits[i];
					var a = o.adjectives;
					for (var j = 0; j < a.length; j += 1)
					{
						filters[a[j]] = true;
					}
					
					$('#img_div').append(ui.getOutfitHTML(o));
				}
				
				ui.showFilters();
			}
		</script>
	</body>
</html>
